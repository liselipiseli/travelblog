<!-- SEO & Meta Tags -->
<meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncatewords: 25 }}{% else %}Persönliches Reisetagebuch von Lisa — echte Orte, keine Werbung.{% endif %}">
<meta name="author" content="Lisa Schmer">
<meta name="robots" content="index, follow">
<link rel="canonical" href="{{ site.url }}{{ site.baseurl }}{{ page.url }}">

<!-- Open Graph (für WhatsApp, Instagram, Facebook) -->
<meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
<meta property="og:title" content="{% if page.title %}{{ page.title }} — Bricks{% else %}Bricks — Reisetagebuch von Lisa{% endif %}">
<meta property="og:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncatewords: 25 }}{% else %}Persönliches Reisetagebuch von Lisa — echte Orte, keine Werbung.{% endif %}">
<meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
<meta property="og:site_name" content="Bricks — Reisetagebuch">
{% if page.cover_image %}
<meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/assets/images/{{ page.cover_image }}">
{% else %}
<meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/assets/images/og-default.jpg">
{% endif %}

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}Bricks — Reisetagebuch{% endif %}">
<meta name="twitter:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncatewords: 25 }}{% else %}Persönliches Reisetagebuch von Lisa.{% endif %}">
{% if page.cover_image %}
<meta name="twitter:image" content="{{ site.url }}{{ site.baseurl }}/assets/images/{{ page.cover_image }}">
{% endif %}

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="{{ site.baseurl }}/assets/favicon.svg">
<link rel="alternate icon" href="{{ site.baseurl }}/assets/favicon.ico">
