backend:
  name: github
  repo: liselipiseli/travelblog
  branch: main

publish_mode: editorial_workflow

media_folder: "assets/images"
public_folder: ""

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

site_url: "https://liselipiseli.github.io/travelblog/"
display_url: "https://liselipiseli.github.io/travelblog/"

locale: "de"

collections:
  - name: "trips"
    label: "Reisen (Übersicht)"
    label_singular: "Reise"
    folder: "_posts"
    create: true
    extension: "md"
    slug: "{{year}}-{{month}}-{{day}}-{{fields.trip_id}}"
    preview_path: "{{year}}/{{month}}/{{day}}/{{trip_id}}/"
    filter: { field: "type", value: "trip" }
    summary: "{{title}} — {{region}}"
    sortable_fields: ["date", "title", "region"]
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "trip" }
      - { label: "Typ", name: "type", widget: "hidden", default: "trip" }
      - label: "Reise-ID (Kurzname)"
        name: "trip_id"
        widget: "string"
        hint: "Kleingeschrieben, ohne Leerzeichen/Umlaute, z.B. 'rom'. Muss bei der Übersicht UND allen Tagen dieser Reise exakt gleich sein!"
      - { label: "Titel", name: "title", widget: "string" }
      - label: "Datum (Reisebeginn)"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: true
      - label: "Region"
        name: "region"
        widget: "select"
        options: ["Europa", "Asien", "Afrika", "Amerika", "Ozeanien"]
      - { label: "Land", name: "country", widget: "string", required: false }
      - label: "Städte"
        name: "cities"
        widget: "list"
        required: false
        hint: "Eine Stadt pro Zeile"
      - label: "Dauer"
        name: "duration"
        widget: "string"
        required: false
        hint: "z.B. '7 Tage'"
      - { label: "Jahreszeit", name: "season", widget: "string", required: false }
      - label: "Cover-Farbe (hell)"
        name: "cover_color"
        widget: "color"
        required: false
        default: "#a8c4d4"
      - label: "Cover-Farbe (dunkel)"
        name: "cover_color_dark"
        widget: "color"
        required: false
        default: "#5a90aa"
      - label: "Cover-Bild"
        name: "cover_image"
        widget: "image"
        required: false
        hint: "Wird automatisch nach assets/images hochgeladen"
      - label: "Bildposition"
        name: "cover_position"
        widget: "string"
        required: false
        default: "center 60%"
        hint: "CSS object-position, z.B. 'center 60%'"
      - label: "Foto-Anzahl"
        name: "photo_count"
        widget: "number"
        required: false
        default: 0
        value_type: "int"
      - label: "Einleitungstext"
        name: "body"
        widget: "markdown"
        required: false

  - name: "days"
    label: "Reisetage"
    label_singular: "Tag"
    folder: "_posts"
    create: true
    extension: "md"
    slug: "{{year}}-{{month}}-{{day}}-{{fields.trip_id}}-tag-{{fields.day_number}}"
    preview_path: "{{year}}/{{month}}/{{day}}/{{trip_id}}-tag-{{day_number}}/"
    filter: { field: "type", value: "day" }
    summary: "{{trip_title}} — Tag {{day_number}} — {{title}}"
    sortable_fields: ["date", "day_number", "title"]
    view_groups:
      - label: "Nach Reise"
        field: trip_title
    view_filters:
      - label: "Athen"
        field: trip_id
        pattern: "athen"
      - label: "Slow Sailing Club"
        field: trip_id
        pattern: "slow-sailing-club"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "day" }
      - { label: "Typ", name: "type", widget: "hidden", default: "day" }
      - label: "Reise-ID"
        name: "trip_id"
        widget: "relation"
        collection: "trips"
        search_fields: ["trip_id", "title"]
        display_fields: ["title"]
        value_field: "trip_id"
        hint: "Wähle die zugehörige Reise aus der Liste — verhindert Tippfehler"
      - label: "Reise-Titel"
        name: "trip_title"
        widget: "relation"
        collection: "trips"
        search_fields: ["trip_id", "title"]
        display_fields: ["title"]
        value_field: "title"
        hint: "Wähle hier die gleiche Reise wie oben aus"
      - { label: "Titel des Tages", name: "title", widget: "string" }
      - label: "Datum"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: true
      - { label: "Tag-Nummer", name: "day_number", widget: "number", value_type: "int" }
      - label: "Headerbild"
        name: "cover_image"
        widget: "image"
        required: false
        hint: "Erscheint als Hintergrundbild oben im Beitrag"
      - label: "Bildposition"
        name: "cover_position"
        widget: "string"
        required: false
        default: "center 60%"
        hint: "CSS object-position, z.B. 'center 60%'"
      - { label: "Ort", name: "location", widget: "string", required: false }
      - { label: "Wetter", name: "weather", widget: "string", required: false }
      - { label: "Highlight des Tages", name: "highlight", widget: "string", required: false }
      - label: "Breitengrad (lat)"
        name: "lat"
        widget: "number"
        value_type: "float"
        required: false
        hint: "Google Maps: Rechtsklick auf den Ort → erste Zahl"
      - label: "Längengrad (lng)"
        name: "lng"
        widget: "number"
        value_type: "float"
        required: false
        hint: "Google Maps: Rechtsklick auf den Ort → zweite Zahl"
      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        hint: "Ein Stichwort pro Zeile"
      - label: "Galerie-Bilder"
        name: "images"
        widget: "list"
        required: false
        hint: "Diese Bilder erscheinen in der Galerie der Reise-Übersicht"
        field: { label: "Bild", name: "image", widget: "image" }
      - { label: "Haupttext", name: "body", widget: "markdown" }
